name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Create local.properties
        run: |
          mkdir -p android
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=${ANDROID_HOME:-$ANDROID_SDK_ROOT}" >> android/local.properties

      - name: Fix settings.gradle
        run: |
          cat > android/settings.gradle << 'EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()

              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.7.3" apply false
              id "org.jetbrains.kotlin.android" version "2.1.0" apply false
              id "com.google.gms.google-services" version "4.4.2" apply false
          }

          include ":app"
          EOF

      - name: Generate Gradle Wrapper
        run: |
          cd android
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          gradle wrapper --gradle-version 8.9
          chmod +x gradlew
          cd ..

      - name: Patch source files for CI
        run: |
          python3 - << 'PY'
          from pathlib import Path
          import re

          # Fix pubspec record version
          pubspec = Path("pubspec.yaml")
          if pubspec.exists():
              content = pubspec.read_text(encoding="utf-8")
              fixed = re.sub(r"^(\s*record:\s*).*$", r"\1^6.0.0", content, flags=re.MULTILINE)
              if fixed != content:
                  pubspec.write_text(fixed, encoding="utf-8")
                  print("✓ record version updated to ^6.0.0")

          # Fix TextDirection.rtl collisions
          files = [
              Path("lib/screens/chat_screen.dart"),
              Path("lib/screens/memories_screen.dart"),
          ]

          for path in files:
              if not path.exists():
                  continue

              content = path.read_text(encoding="utf-8")
              original = content

              content = content.replace("TextDirection.rtl", "ui.TextDirection.rtl")

              if "ui.TextDirection.rtl" in content and "import 'dart:ui' as ui;" not in content:
                  lines = content.splitlines()
                  insert_at = 0
                  for i, line in enumerate(lines):
                      if line.strip().startswith("import "):
                          insert_at = i + 1
                  lines.insert(insert_at, "import 'dart:ui' as ui;")
                  content = "\n".join(lines) + "\n"

              if content != original:
                  path.write_text(content, encoding="utf-8")
                  print(f"✓ patched {path}")
          PY

      - name: Verify important files
        run: |
          echo "=== pubspec record ==="
          grep -n "record:" pubspec.yaml || true
          echo
          echo "=== chat_screen ==="
          grep -n "TextDirection\|ui.TextDirection" lib/screens/chat_screen.dart || true
          echo
          echo "=== memories_screen ==="
          grep -n "TextDirection\|ui.TextDirection" lib/screens/memories_screen.dart || true
          echo
          echo "=== page_service ==="
          grep -n "http-equiv" lib/services/page_service.dart || true

      - name: Verify google-services.json
        run: |
          if [ -f "android/app/google-services.json" ]; then
            echo "✓ google-services.json found"
          else
            echo "✗ google-services.json missing"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kokabna-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
