name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Regenerate Gradle wrapper
        run: |
          sudo apt-get install -y gradle -q
          cd android
          gradle wrapper --gradle-version=8.4 --distribution-type=all
          chmod +x gradlew

      - name: Verify google-services.json
        run: |
          if [ -f "android/app/google-services.json" ]; then
            echo "✓ google-services.json موجود"
          else
            echo "✗ google-services.json مفقود" && exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kokabna-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
