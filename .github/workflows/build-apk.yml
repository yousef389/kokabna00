name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Fix gradle-wrapper.jar
        run: |
          JAR_SRC="$FLUTTER_ROOT/packages/flutter_tools/templates/app_shared/android.tmpl/gradle/wrapper/gradle-wrapper.jar"
          if [ -f "$JAR_SRC" ]; then
            cp "$JAR_SRC" android/gradle/wrapper/gradle-wrapper.jar
          else
            JAR_SRC=$(find $FLUTTER_ROOT -name "gradle-wrapper.jar" | head -1)
            cp "$JAR_SRC" android/gradle/wrapper/gradle-wrapper.jar
          fi
          echo "gradle-wrapper.jar: $(ls -lh android/gradle/wrapper/gradle-wrapper.jar)"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Verify google-services.json
        run: |
          if [ -f "android/app/google-services.json" ]; then
            echo "✓ google-services.json found"
          else
            echo "✗ google-services.json MISSING" && exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kokabna-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
