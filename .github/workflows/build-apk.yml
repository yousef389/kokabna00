name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      # ✅ الحل الرئيسي - إعادة توليد gradle wrapper
      - name: Fix Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version=8.4
          cd ..

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Fix page_service.dart regex
        run: |
          python3 - << 'PYEOF'
          path = 'lib/services/page_service.dart'
          try:
              with open(path, 'r') as f:
                  lines = f.readlines()
              for i, line in enumerate(lines):
                  if 'http-equiv' in line and 'replaceAll' in line:
                      lines[i] = "        .replaceAll(RegExp(r'<meta[^>]+http-equiv=[\"\\']refresh[\"\\'][^>]*>', caseSensitive: false), '');\n"
                      print(f'Fixed line {i+1}')
              with open(path, 'w') as f:
                  f.writelines(lines)
          except FileNotFoundError:
              print(f'File not found: {path}, skipping')
          PYEOF

      - name: Verify google-services.json
        run: |
          if [ -f "android/app/google-services.json" ]; then
            echo "✓ google-services.json found"
          else
            echo "✗ google-services.json MISSING"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --android-skip-build-dependency-validation

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kokabna-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
