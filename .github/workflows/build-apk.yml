name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Fix settings.gradle
        run: |
          cat > android/settings.gradle << 'EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()

              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.7.3" apply false
              id "org.jetbrains.kotlin.android" version "2.1.0" apply false
          }

          include ":app"
          EOF

      - name: Replace gradlew with system Gradle
        run: |
          # إنشاء gradle-wrapper.jar حقيقي عن طريق gradle نفسه
          cd android
          
          # إنشاء wrapper properties أولاً
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.9-all.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # استخدام gradle المثبت من setup-gradle لإنشاء الـ wrapper
          gradle wrapper --gradle-version=8.9
          
          chmod +x gradlew
          
          echo "✓ gradle-wrapper.jar size: $(du -sh gradle/wrapper/gradle-wrapper.jar)"
          cd ..

      - name: Fix page_service.dart
        run: |
          python3 - << 'PYEOF'
          path = 'lib/services/page_service.dart'
          try:
              with open(path, 'r') as f:
                  lines = f.readlines()
              for i, line in enumerate(lines):
                  if 'http-equiv' in line and 'replaceAll' in line:
                      lines[i] = "        .replaceAll(RegExp(r'<meta[^>]+http-equiv=[\"\\']refresh[\"\\'][^>]*>', caseSensitive: false), '');\n"
                      print(f'Fixed line {i+1}')
              with open(path, 'w') as f:
                  f.writelines(lines)
          except FileNotFoundError:
              print(f'File not found: {path}, skipping')
          PYEOF

      - name: Verify google-services.json
        run: |
          if [ -f "android/app/google-services.json" ]; then
            echo "✓ google-services.json found"
          else
            echo "✗ google-services.json MISSING"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --android-skip-build-dependency-validation

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kokabna-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
